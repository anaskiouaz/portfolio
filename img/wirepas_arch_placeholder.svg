<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="880" viewBox="0 0 1400 880" role="img" aria-labelledby="title desc">
  <title id="title">Wirepas - Schéma d'architecture (placeholder)</title>
  <desc id="desc">Visuel placeholder d'architecture applicative Wirepas: collecte, enrichissement, IA et CRM.</desc>
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#162238"/>
    </linearGradient>
    <linearGradient id="line2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B46FF"/>
      <stop offset="100%" stop-color="#00F5FF"/>
    </linearGradient>
    <style>
      .title { font: 700 38px 'Inter', 'Segoe UI', sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 20px 'Inter', 'Segoe UI', sans-serif; fill: #93c5fd; }
      .box { fill: rgba(15,23,42,.72); stroke: rgba(147,197,253,.45); stroke-width: 2; rx: 14; }
      .text { font: 600 20px 'Inter', 'Segoe UI', sans-serif; fill: #e2e8f0; }
      .small { font: 500 15px 'Inter', 'Segoe UI', sans-serif; fill: #cbd5e1; }
      .link { stroke: url(#line2); stroke-width: 4; fill: none; marker-end: url(#arrow2); }
    </style>
    <marker id="arrow2" markerWidth="12" markerHeight="8" refX="11" refY="4" orient="auto">
      <polygon points="0 0, 12 4, 0 8" fill="#00F5FF"/>
    </marker>
  </defs>

  <rect width="1400" height="880" fill="url(#bg2)"/>
  <text class="title" x="80" y="95">Architecture fonctionnelle — IA Wirepas France</text>
  <text class="subtitle" x="80" y="130">Placeholder temporaire en attendant les captures produit finales</text>

  <rect class="box" x="90" y="250" width="250" height="150"/>
  <text class="text" x="130" y="320">Collecte</text>
  <text class="small" x="130" y="350">CSV • PDF • Web</text>

  <rect class="box" x="430" y="250" width="250" height="150"/>
  <text class="text" x="455" y="320">Enrichissement</text>
  <text class="small" x="470" y="350">APIs secteur/technos</text>

  <rect class="box" x="770" y="250" width="250" height="150"/>
  <text class="text" x="820" y="320">Qualification IA</text>
  <text class="small" x="795" y="350">OpenRouter • scoring</text>

  <rect class="box" x="1110" y="250" width="230" height="150"/>
  <text class="text" x="1145" y="320">Dashboard</text>
  <text class="small" x="1145" y="350">sync HubSpot CRM</text>

  <path class="link" d="M340 325 H430"/>
  <path class="link" d="M680 325 H770"/>
  <path class="link" d="M1020 325 H1110"/>
</svg>
