<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="880" viewBox="0 0 1400 880" role="img" aria-labelledby="title desc">
  <title id="title">Wirepas - Diagramme de séquence IA prospects</title>
  <desc id="desc">Diagramme de séquence présentant le pipeline scraping, enrichissement, qualification IA et synchronisation CRM.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6B46FF"/>
      <stop offset="100%" stop-color="#00F5FF"/>
    </linearGradient>
    <style>
      .title { font: 700 40px 'Inter', 'Segoe UI', sans-serif; fill: #f8fafc; }
      .subtitle { font: 500 22px 'Inter', 'Segoe UI', sans-serif; fill: #94a3b8; }
      .laneTitle { font: 600 20px 'Inter', 'Segoe UI', sans-serif; fill: #e2e8f0; }
      .label { font: 500 17px 'Inter', 'Segoe UI', sans-serif; fill: #cbd5e1; }
      .step { font: 600 16px 'Inter', 'Segoe UI', sans-serif; fill: #f8fafc; }
      .meta { font: 500 14px 'Inter', 'Segoe UI', sans-serif; fill: #cbd5e1; }
      .lane { fill: rgba(15,23,42,.55); stroke: rgba(148,163,184,.35); stroke-width: 1.5; rx: 18; }
      .head { fill: rgba(30,41,59,.85); stroke: rgba(148,163,184,.45); stroke-width: 1.5; rx: 12; }
      .lifeline { stroke: rgba(148,163,184,.35); stroke-width: 2; stroke-dasharray: 8 8; }
      .msg { stroke: url(#accent); stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .msgBack { stroke: #7dd3fc; stroke-width: 2.2; fill: none; stroke-dasharray: 8 8; marker-end: url(#arrowBack); }
      .box { fill: rgba(15,23,42,.72); stroke: rgba(107,70,255,.6); stroke-width: 1.5; rx: 10; }
      .badge { fill: rgba(107,70,255,.16); stroke: rgba(107,70,255,.55); stroke-width: 1.2; rx: 16; }
    </style>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#00F5FF"/>
    </marker>
    <marker id="arrowBack" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#7dd3fc"/>
    </marker>
  </defs>

  <rect width="1400" height="880" fill="url(#bg)"/>
  <rect x="30" y="30" width="1340" height="820" fill="none" stroke="rgba(148,163,184,.25)" rx="26"/>

  <text x="70" y="95" class="title">Wirepas France — Pipeline IA de qualification prospects</text>
  <text x="70" y="130" class="subtitle">Scraping → Enrichissement API → Qualification LLM (OpenRouter) → Synchronisation CRM</text>

  <g transform="translate(70,170)">
    <rect class="lane" x="0" y="0" width="280" height="650"/>
    <rect class="head" x="18" y="16" width="244" height="70"/>
    <text class="laneTitle" x="40" y="58">Sources Salon / Web</text>
    <line class="lifeline" x1="140" y1="95" x2="140" y2="620"/>
  </g>

  <g transform="translate(385,170)">
    <rect class="lane" x="0" y="0" width="280" height="650"/>
    <rect class="head" x="18" y="16" width="244" height="70"/>
    <text class="laneTitle" x="40" y="58">Pipeline Data</text>
    <line class="lifeline" x1="140" y1="95" x2="140" y2="620"/>
  </g>

  <g transform="translate(700,170)">
    <rect class="lane" x="0" y="0" width="280" height="650"/>
    <rect class="head" x="18" y="16" width="244" height="70"/>
    <text class="laneTitle" x="55" y="58">OpenRouter / LLM</text>
    <line class="lifeline" x1="140" y1="95" x2="140" y2="620"/>
  </g>

  <g transform="translate(1015,170)">
    <rect class="lane" x="0" y="0" width="280" height="650"/>
    <rect class="head" x="18" y="16" width="244" height="70"/>
    <text class="laneTitle" x="82" y="58">Dashboard + CRM</text>
    <line class="lifeline" x1="140" y1="95" x2="140" y2="620"/>
  </g>

  <path class="msg" d="M210 300 H520"/>
  <text class="step" x="250" y="287">1. Import CSV/PDF/Web</text>
  <text class="meta" x="250" y="318">normalisation des champs prospects</text>

  <path class="msg" d="M525 395 H835"/>
  <text class="step" x="565" y="382">2. Prompt de qualification</text>
  <text class="meta" x="565" y="413">secteur, score, techno-fit, priorité</text>

  <path class="msgBack" d="M835 475 H525"/>
  <text class="step" x="565" y="462">3. Réponse structurée JSON</text>

  <path class="msg" d="M840 560 H1150"/>
  <text class="step" x="875" y="547">4. Push vers dashboard</text>
  <text class="meta" x="875" y="578">tri prioritaire + export HubSpot</text>

  <path class="msgBack" d="M1150 645 H210"/>
  <text class="step" x="520" y="632">5. Retour analyste & itération prompt</text>

  <g transform="translate(430,700)">
    <rect class="box" x="0" y="0" width="540" height="95"/>
    <rect class="badge" x="18" y="18" width="230" height="36"/>
    <text class="label" x="32" y="42">Résultat attendu</text>
    <text class="meta" x="20" y="72">Priorisation fiable des prospects en quelques minutes au lieu d'un tri manuel long.</text>
  </g>
</svg>
